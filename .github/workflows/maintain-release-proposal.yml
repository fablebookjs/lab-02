name: Maintain release proposal

on:
  repository_dispatch:
    types:
      - release-completed
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release proposal signal
    types:
      - completed

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-proposal-writes
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.repository == 'fablebookjs/lab-02' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check out only the trusted main controller
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Use Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Install the locked controller workspace
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Compile and test the trusted controller
        run: npm run compile && npm test
      - name: Prepare proposal transitions without write authority
        env:
          GH_TOKEN: ${{ github.token }}
          OUTPUT: ${{ runner.temp }}/release-maintenance
        run: >-
          node scripts/release-proposal.mjs prepare-maintenance
          --output "$OUTPUT"
      - name: Transfer inert Git objects and their transition manifest
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-maintenance-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/release-maintenance/objects.bundle
            ${{ runner.temp }}/release-maintenance/transition.json
          retention-days: 1

  apply:
    needs: prepare
    runs-on: ubuntu-latest
    environment: release-github
    steps:
      - name: Check out only the trusted main controller
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
      - name: Use Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Download the prepared transitions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: release-maintenance-${{ github.run_id }}
          path: ${{ runner.temp }}/release-maintenance
      - name: Mint the repository-scoped release App token
        id: release-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - name: Apply guarded proposal transitions
        env:
          GH_TOKEN: ${{ steps.release-app.outputs.token }}
          OUTPUT: ${{ runner.temp }}/release-maintenance
        run: |
          arguments=(
            apply-maintenance
            --transition "$OUTPUT/transition.json"
          )
          if [[ -f "$OUTPUT/objects.bundle" ]]; then
            arguments+=(--bundle "$OUTPUT/objects.bundle")
          fi
          node scripts/release-proposal.mjs "${arguments[@]}"
